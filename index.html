<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM POWER ANALYZER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#eef3f8;
--panel:#ffffff;
--border:#e3ebf3;
--text:#18324b;
--muted:#6d7f90;
--green:#1fa36b;
--blue:#2d9cdb;
--shadow:0 14px 35px rgba(18,41,64,0.10);
}

*{
box-sizing:border-box;
}

body{
margin:0;
padding:30px;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
}

.page{
max-width:1200px;
margin:auto;
}

.hero{
background:linear-gradient(135deg,#17324c,#204c6f);
color:white;
border-radius:20px;
padding:25px;
margin-bottom:25px;
}

.hero h1{
margin:0;
font-size:32px;
}

.device{
margin-top:10px;
font-size:18px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:25px;
}

.card{
background:var(--panel);
border-radius:20px;
padding:22px;
border:1px solid var(--border);
box-shadow:var(--shadow);
}

.card-title{
font-size:14px;
color:var(--muted);
margin-bottom:10px;
}

.card-value{
font-size:34px;
font-weight:bold;
color:var(--green);
}

.chart-card{
background:white;
border-radius:22px;
padding:25px;
box-shadow:var(--shadow);
border:1px solid var(--border);
}

.chart-header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:15px;
}

.chart-header h2{
margin:0;
font-size:26px;
}

.controls{
display:flex;
gap:12px;
flex-wrap:wrap;
align-items:end;
}

.controls label{
font-size:13px;
color:var(--muted);
}

.controls input{
padding:8px 10px;
border-radius:8px;
border:1px solid var(--border);
}

.controls button{
background:var(--green);
color:white;
border:none;
padding:9px 14px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.chart-wrap{
background:#f8fafc;
border-radius:16px;
padding:15px;
border:1px solid var(--border);
}

#chartVoltageAN{
height:380px !important;
}

.error{
text-align:center;
color:#c0392b;
font-weight:bold;
margin-top:15px;
}

@media(max-width:900px){
.cards{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="page">

<div class="hero">
<h1>FM POWER ANALYZER</h1>
<div class="device">Equipo: <b id="device">--</b></div>
</div>

<div class="cards">

<div class="card">
<div class="card-title">Voltaje A-N</div>
<div class="card-value" id="voltaje">--</div>
</div>

<div class="card">
<div class="card-title">Corriente</div>
<div class="card-value" id="corriente">--</div>
</div>

<div class="card">
<div class="card-title">Frecuencia</div>
<div class="card-value" id="frecuencia">--</div>
</div>

<div class="card">
<div class="card-title">Potencia Activa</div>
<div class="card-value" id="ptot">--</div>
</div>

<div class="card">
<div class="card-title">Potencia Reactiva</div>
<div class="card-value" id="qtot">--</div>
</div>

<div class="card">
<div class="card-title">Potencia Aparente</div>
<div class="card-value" id="stot">--</div>
</div>

</div>

<div class="chart-card">

<div class="chart-header">

<h2>Curva Voltaje A-N</h2>

<div class="controls">

<div>
<label>Desde</label><br>
<input type="date" id="fromDate">
</div>

<div>
<label>Hasta</label><br>
<input type="date" id="toDate">
</div>

<div>
<label>&nbsp;</label><br>
<button onclick="cargarCurvaVoltaje()">Consultar</button>
</div>

</div>

</div>

<div class="chart-wrap">
<canvas id="chartVoltageAN"></canvas>
</div>

</div>

<div class="error" id="error"></div>

</div>


<script>

const params = new URLSearchParams(window.location.search);
const device = params.get("device") || "FMAN-0001";

let chartVoltageAN=null;

function hoyTexto(){
const ahora=new Date();
const y=ahora.getFullYear();
const m=String(ahora.getMonth()+1).padStart(2,"0");
const d=String(ahora.getDate()).padStart(2,"0");
return `${y}-${m}-${d}`;
}

async function actualizar(){

try{

const url="https://fm-power-analyzer-server.onrender.com/api/device/"+device+"?t="+Date.now();

const res=await fetch(url,{cache:"no-store"});

const data=await res.json();

if(!data.ok){
document.getElementById("error").innerText="No hay datos";
return;
}

document.getElementById("error").innerText="";

document.getElementById("device").innerText=data.device_id;

document.getElementById("voltaje").innerText=(data.data.voltage_an??"--")+" V";

document.getElementById("corriente").innerText=(data.data.current_a??"--")+" A";

document.getElementById("frecuencia").innerText=(data.data.frecuencia??data.data.frequency??"--")+" Hz";

document.getElementById("ptot").innerText=(data.data.ptot??"--")+" kW";

document.getElementById("qtot").innerText=(data.data.qtot??"--")+" kVAR";

document.getElementById("stot").innerText=(data.data.stot??"--")+" kVA";

}
catch(e){

document.getElementById("error").innerText="Error conectando API";

}

}



async function cargarCurvaVoltaje(){

try{

const from=document.getElementById("fromDate").value;
const to=document.getElementById("toDate").value;

let url="https://fm-power-analyzer-server.onrender.com/api/history?device_id="+device;

if(from&&to){

url+="&from="+from+"&to="+to;

}

const res=await fetch(url);

const json=await res.json();

if(!json.ok||!json.data){

return;

}

const labels=json.data.map(item=>{

const f=new Date(item.created_at);

return f.toLocaleTimeString();

});

const values=json.data.map(item=>Number(item.voltage_an));

const ctx=document.getElementById("chartVoltageAN").getContext("2d");

if(!chartVoltageAN){

chartVoltageAN=new Chart(ctx,{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Voltaje A-N (V)",
data:values,
borderColor:"#2d9cdb",
backgroundColor:"rgba(45,156,219,0.1)",
borderWidth:3,
pointRadius:0,
tension:0.3,
fill:true
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
animation:false
}

});

}
else{

chartVoltageAN.data.labels=labels;
chartVoltageAN.data.datasets[0].data=values;
chartVoltageAN.update("none");

}

}
catch(e){

document.getElementById("error").innerText="Error al consultar curva";

}

}



window.addEventListener("load",()=>{

const hoy=hoyTexto();

document.getElementById("fromDate").value=hoy;
document.getElementById("toDate").value=hoy;

actualizar();
cargarCurvaVoltaje();

setInterval(()=>{

actualizar();
cargarCurvaVoltaje();

},2000);

});

</script>

</body>
</html>
