<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FM POWER ANALYZER</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --border: #e3ebf3;
      --text: #18324b;
      --muted: #6d7f90;
      --green: #1fa36b;
      --blue: #2d9cdb;
      --shadow: 0 14px 35px rgba(18, 41, 64, 0.10);
      --danger: #c0392b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1200px;
      margin: auto;
    }

    .hero {
      background: linear-gradient(135deg, #17324c, #204c6f);
      color: white;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
    }

    .device {
      margin-top: 10px;
      font-size: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 25px;
    }

    .card {
      background: var(--panel);
      border-radius: 20px;
      padding: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 34px;
      font-weight: bold;
      color: var(--green);
      line-height: 1.1;
    }

    .chart-card {
      background: white;
      border-radius: 22px;
      padding: 25px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 15px;
    }

    .chart-header h2 {
      margin: 0;
      font-size: 26px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }

    .control-group label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .controls input {
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: white;
    }

    .controls button {
      background: var(--green);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .controls button:hover {
      opacity: 0.95;
    }

    .chart-wrap {
      background: #f8fafc;
      border-radius: 16px;
      padding: 15px;
      border: 1px solid var(--border);
    }

    #chartVoltageAN {
      width: 100%;
      height: 380px !important;
    }

    .error {
      text-align: center;
      color: var(--danger);
      font-weight: bold;
      margin-top: 15px;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .chart-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="hero">
      <h1>FM POWER ANALYZER</h1>
      <div class="device">Equipo: <b id="device">--</b></div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">Voltaje A-N</div>
        <div class="card-value" id="voltaje">--</div>
      </div>

      <div class="card">
        <div class="card-title">Corriente</div>
        <div class="card-value" id="corriente">--</div>
      </div>

      <div class="card">
        <div class="card-title">Frecuencia</div>
        <div class="card-value" id="frecuencia">--</div>
      </div>

      <div class="card">
        <div class="card-title">Potencia Activa</div>
        <div class="card-value" id="ptot">--</div>
      </div>

      <div class="card">
        <div class="card-title">Potencia Reactiva</div>
        <div class="card-value" id="qtot">--</div>
      </div>

      <div class="card">
        <div class="card-title">Potencia Aparente</div>
        <div class="card-value" id="stot">--</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <h2>Curva de Voltaje A-N</h2>

        <div class="controls">
          <div class="control-group">
            <label for="dayDate">Fecha</label>
            <input type="date" id="dayDate">
          </div>

          <div class="control-group">
            <label>&nbsp;</label>
            <button onclick="cargarCurvaVoltaje()">Consultar</button>
          </div>
        </div>
      </div>

      <div class="chart-wrap">
        <canvas id="chartVoltageAN"></canvas>
      </div>
    </div>

    <div class="error" id="error"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const device = params.get("device") || "FMAN-0001";

    let chartVoltageAN = null;

    function hoyTexto() {
      const ahora = new Date();
      const y = ahora.getFullYear();
      const m = String(ahora.getMonth() + 1).padStart(2, "0");
      const d = String(ahora.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    async function actualizar() {
      try {
        const url =
          "https://fm-power-analyzer-server.onrender.com/api/device/" +
          device +
          "?t=" + Date.now();

        const res = await fetch(url, { cache: "no-store" });
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("error").innerText = "No hay datos del dispositivo";
          return;
        }

        document.getElementById("error").innerText = "";
        document.getElementById("device").innerText = data.device_id;
        document.getElementById("voltaje").innerText = (data.data.voltage_an ?? "--") + " V";
        document.getElementById("corriente").innerText = (data.data.current_a ?? "--") + " A";
        document.getElementById("frecuencia").innerText = (data.data.frecuencia ?? data.data.frequency ?? "--") + " Hz";
        document.getElementById("ptot").innerText = (data.data.ptot ?? "--") + " kW";
        document.getElementById("qtot").innerText = (data.data.qtot ?? "--") + " kVAR";
        document.getElementById("stot").innerText = (data.data.stot ?? "--") + " kVA";
      } catch (e) {
        document.getElementById("error").innerText = "Error conectando con la API";
      }
    }

    async function cargarCurvaVoltaje() {
      try {
        const day = document.getElementById("dayDate").value;

        let url =
          "https://fm-power-analyzer-server.onrender.com/api/history?device_id=" +
          encodeURIComponent(device);

        if (day) {
          url += "&from=" + encodeURIComponent(day) + "&to=" + encodeURIComponent(day);
        }

        url += "&t=" + Date.now();

        const res = await fetch(url, { cache: "no-store" });
        const json = await res.json();

        if (!json.ok || !json.data || json.data.length === 0) {
          document.getElementById("error").innerText = "No hay datos para graficar";
          return;
        }

        document.getElementById("error").innerText = "";

        const labels = json.data.map(item => {
          const f = new Date(item.created_at);
          return f.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          });
        });

        const values = json.data.map(item =>
          item.voltage_an !== null ? Number(item.voltage_an) : null
        );

        const ctx = document.getElementById("chartVoltageAN").getContext("2d");

        if (!chartVoltageAN) {
          chartVoltageAN = new Chart(ctx, {
            type: "line",
            data: {
              labels: labels,
              datasets: [
                {
                  data: values,
                  borderColor: "#2d9cdb",
                  backgroundColor: "rgba(45,156,219,0.10)",
                  borderWidth: 3,
                  pointRadius: 0,
                  pointHoverRadius: 4,
                  tension: 0.3,
                  fill: true,
                  spanGaps: true
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              plugins: {
                legend: {
                  display: false
                }
              },
              scales: {
                x: {
                  ticks: {
                    maxTicksLimit: 8
                  }
                },
                y: {
                  title: {
                    display: true,
                    text: "V"
                  }
                }
              }
            }
          });
        } else {
          chartVoltageAN.data.labels = labels;
          chartVoltageAN.data.datasets[0].data = values;
          chartVoltageAN.update("none");
        }
      } catch (e) {
        document.getElementById("error").innerText = "Error al consultar curva";
      }
    }

    window.addEventListener("load", () => {
      const hoy = hoyTexto();
      document.getElementById("dayDate").value = hoy;

      actualizar();
      cargarCurvaVoltaje();

      setInterval(() => {
        actualizar();
        cargarCurvaVoltaje();
      }, 500);
    });
  </script>
</body>
</html>
