<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FM POWER ANALYZER</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    .status {
      text-align: center;
      margin-bottom: 25px;
      font-size: 18px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 950px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .chart-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 950px;
      margin: 25px auto 0 auto;
    }

    .chart-title {
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 15px;
      text-align: center;
    }

    .chart-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: end;
      margin-bottom: 20px;
    }

    .chart-controls label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
      text-align: left;
    }

    .chart-controls input,
    .chart-controls button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .chart-controls button {
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .chart-controls button:hover {
      background: #219150;
    }

    .label {
      color: #666;
      font-size: 18px;
    }

    .value {
      font-size: 32px;
      font-weight: bold;
      margin-top: 12px;
      color: #27ae60;
    }

    .error {
      text-align: center;
      color: #c0392b;
      margin-top: 20px;
      font-weight: bold;
    }

    #chartVoltageAN {
      width: 100%;
      height: 350px !important;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      body {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <h1>FM POWER ANALYZER</h1>

  <div class="status">
    Equipo: <b id="device">--</b>
  </div>

  <div class="container">
    <div class="card">
      <div class="label">Voltaje A-N</div>
      <div class="value" id="voltaje">--</div>
    </div>

    <div class="card">
      <div class="label">Corriente</div>
      <div class="value" id="corriente">--</div>
    </div>

    <div class="card">
      <div class="label">Frecuencia</div>
      <div class="value" id="frecuencia">--</div>
    </div>

    <div class="card">
      <div class="label">Potencia Activa</div>
      <div class="value" id="ptot">--</div>
    </div>

    <div class="card">
      <div class="label">Potencia Reactiva</div>
      <div class="value" id="qtot">--</div>
    </div>

    <div class="card">
      <div class="label">Potencia Aparente</div>
      <div class="value" id="stot">--</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Curva de Voltaje A-N</div>

    <div class="chart-controls">
      <div>
        <label for="fromDate">Desde</label>
        <input type="date" id="fromDate">
      </div>

      <div>
        <label for="toDate">Hasta</label>
        <input type="date" id="toDate">
      </div>

      <div>
        <button onclick="cargarCurvaVoltaje()">Consultar curva</button>
      </div>
    </div>

    <canvas id="chartVoltageAN"></canvas>
  </div>

  <div class="error" id="error"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const device = params.get("device") || "FMAN-0001";

    let chartVoltageAN = null;

    function hoyTexto() {
      const ahora = new Date();
      const y = ahora.getFullYear();
      const m = String(ahora.getMonth() + 1).padStart(2, "0");
      const d = String(ahora.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    async function actualizar() {
      try {
        const url =
          "https://fm-power-analyzer-server.onrender.com/api/device/" +
          device +
          "?t=" + Date.now();

        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        const data = await res.json();

        console.log("Respuesta API tiempo real:", data);

        if (!data.ok) {
          document.getElementById("error").innerText = "No se encontraron datos del dispositivo";
          return;
        }

        document.getElementById("error").innerText = "";
        document.getElementById("device").innerText = data.device_id;

        document.getElementById("voltaje").innerText =
          (data.data.voltage_an ?? "--") + " V";

        document.getElementById("corriente").innerText =
          (data.data.current_a ?? "--") + " A";

        document.getElementById("frecuencia").innerText =
          (data.data.frecuencia ?? "--") + " Hz";

        document.getElementById("ptot").innerText =
          (data.data.ptot ?? "--") + " kW";

        document.getElementById("qtot").innerText =
          (data.data.qtot ?? "--") + " kVAR";

        document.getElementById("stot").innerText =
          (data.data.stot ?? "--") + " kVA";
      } catch (e) {
        console.error("Error actualizando:", e);
        document.getElementById("error").innerText = "Error conectando con la API";
      }
    }

    async function cargarCurvaVoltaje() {
      try {
        const from = document.getElementById("fromDate").value || hoyTexto();
        const to = document.getElementById("toDate").value || hoyTexto();

        const url =
          "https://fm-power-analyzer-server.onrender.com/api/history" +
          "?device_id=" + encodeURIComponent(device) +
          "&from=" + encodeURIComponent(from) +
          "&to=" + encodeURIComponent(to) +
          "&t=" + Date.now();

        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        const json = await res.json();

        console.log("Respuesta API histórico:", json);

        if (!json.ok) {
          document.getElementById("error").innerText = "No se pudo cargar el histórico";
          return;
        }

        const labels = json.data.map(item =>
          new Date(item.created_at).toLocaleString()
        );

        const values = json.data.map(item =>
          item.voltage_an !== null ? Number(item.voltage_an) : null
        );

        const ctx = document.getElementById("chartVoltageAN").getContext("2d");

        if (chartVoltageAN) {
          chartVoltageAN.destroy();
        }

        chartVoltageAN = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Voltaje A-N (V)",
                data: values,
                borderWidth: 2,
                tension: 0.2,
                spanGaps: true
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: true
              }
            },
            scales: {
              x: {
                ticks: {
                  maxRotation: 45,
                  minRotation: 45,
                  autoSkip: true,
                  maxTicksLimit: 12
                }
              },
              y: {
                beginAtZero: false
              }
            }
          }
        });
      } catch (e) {
        console.error("Error cargando curva:", e);
        document.getElementById("error").innerText = "Error cargando la curva de voltaje";
      }
    }

    window.addEventListener("load", () => {
      const hoy = hoyTexto();
      document.getElementById("fromDate").value = hoy;
      document.getElementById("toDate").value = hoy;

      actualizar();
      cargarCurvaVoltaje();
      setInterval(actualizar, 2000);
    });
  </script>
</body>
</html>
